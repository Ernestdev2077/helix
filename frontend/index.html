<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="helix — agent-native SMM workspace for X / Reddit / LinkedIn" />
    <title>helix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!--
      Pre-paint theme: applies `.light` BEFORE the bundle loads to avoid FOUC.
      Saved value: 'system' | 'dark' | 'light' (default 'system').
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('helix.theme') || 'system'
          var prefersLight =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: light)').matches
          var useLight = saved === 'light' || (saved === 'system' && prefersLight)
          if (useLight) document.documentElement.classList.add('light')
        } catch (e) {}
      })()
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
